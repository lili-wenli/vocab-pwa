<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d5a3a" />
  <title>Vocabulary Learning</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="app">
    <header>
      <h1>📚 生词本</h1>
      <p class="subtitle">艾宾浩斯复习 · 每日最多 20 个新词</p>
    </header>

    <!-- 添加新词表单 -->
    <section class="add-form">
      <h2>添加新词</h2>
      <p class="daily-count">今日已添加 <span id="todayCount">0</span> / 20</p>
      <form id="addWordForm">
        <label>英文
          <div class="input-with-btn">
            <input type="text" id="english" placeholder="e.g. apple" required />
            <button type="button" id="lookupBtn" class="btn-lookup">查词</button>
          </div>
        </label>
        <label>音标 <input type="text" id="phonetic" placeholder="e.g. /ˈæpl/" /></label>
        <label>中文释义 <input type="text" id="chinese" placeholder="e.g. 苹果" required /></label>
        <label>例句 <input type="text" id="example" placeholder="e.g. I eat an apple every day." /></label>
        <label>例句翻译 <input type="text" id="exampleTranslation" placeholder="e.g. 我每天吃一个苹果。" /></label>
        <button type="submit">添加</button>
      </form>
    </section>

    <!-- 今日新词 -->
    <section class="word-list">
      <h2>今日新词</h2>
      <div id="newWordsList"></div>
    </section>

    <!-- 今日复习进度 -->
    <section class="review-progress">
      <h2>今日复习进度</h2>
      <p class="progress-text">待复习 <span id="dueCount">0</span> · 已复习 <span id="reviewedCount">0</span></p>
      <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </section>

    <!-- 今日待复习 -->
    <section class="word-list">
      <h2>今日待复习</h2>
      <div id="reviewWordsList"></div>
    </section>

    <!-- 已掌握 -->
    <section class="word-list mastered-section">
      <h2>已掌握</h2>
      <div id="masteredWordsList"></div>
    </section>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (err) {
          console.log('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
